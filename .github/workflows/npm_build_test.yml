name: NPM build and test

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
        working-directory: ./frontend
      - run: npm ci
      - run: npm run build --if-present
      - run: npm run test:unit
